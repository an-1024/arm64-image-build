services:
  runtime:
    image: uos1070u1-java21-redis7-nginx1.31.2-arm64:v1
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: registry.uniontech.com/uos-server-base/uos-server-20-1070u1e:latest
        NGINX_VERSION: 1.30.3
        REDIS_VERSION: 7.4.9
    platform: linux/arm64
    ports:
      - "80:80"
      - "6379:6379"
      - "8080:8080"
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75"
    volumes:
      - ./app:/opt/app
      - runtime-data:/data
      - runtime-logs:/logs

volumes:
  runtime-data:
  runtime-logs:
