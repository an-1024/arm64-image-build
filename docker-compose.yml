services:
  runtime:
    image: uos1070u1-java21-redis7-nginx1.26.2-arm64:1.2
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ghcr.io/an-1024/uos-server-20-1070u1e-arm64:latest
        NGINX_VERSION: 1.26.2
        REDIS_VERSION: 7.4.7
    platform: linux/arm64
    ports:
      - "80:80"
      - "6379:6379"
      - "8080:8080"
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75"
    volumes:
      - ./app:/opt/app
      - runtime-data:/data
      - runtime-logs:/logs

volumes:
  runtime-data:
  runtime-logs:
