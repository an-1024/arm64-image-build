name: Build ARM64 Runtime

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: UOS base image reachable from the GitHub runner
        required: true
        default: ghcr.io/an-1024/uos-server-20-1070u1e-arm64:latest
        type: string
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - entrypoint.sh
      - nginx/**
      - redis/**
      - scripts/**
      - .github/workflows/build-arm64.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE: uos1070u1-java21-redis7-nginx1.26.2-arm64:v2
  BASE_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.base_image || 'ghcr.io/an-1024/uos-server-20-1070u1e-arm64:latest' }}
  NGINX_VERSION: "1.26.2"
  REDIS_VERSION: "7.4.0"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and verify ARM64 image
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build, verify, and export artifacts
        env:
          ALLOW_NON_ARM64_BUILD: "1"
        run: |
          chmod +x entrypoint.sh scripts/*.sh
          ./scripts/build-arm64.sh

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uos1070u1-runtime-arm64
          path: |
            artifacts/*.tar.gz
            artifacts/dependency-audit/**
          if-no-files-found: error
          retention-days: 14
