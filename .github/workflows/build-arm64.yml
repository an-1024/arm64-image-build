name: Build ARM64 Runtime

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: UOS base image reachable from the GitHub runner
        required: true
        default: ghcr.io/an-1024/uos-server-20-1070u1e-arm64:latest
        type: string
  push:
    branches:
      - main
      - fix/build-compile
    paths:
      - Dockerfile
      - entrypoint.sh
      - nginx/**
      - redis/**
      - scripts/**
      - .github/workflows/build-arm64.yml

permissions:
  contents: write
  packages: write

env:
  IMAGE: uos1070u1-java21-redis7-nginx1.26.2-arm64:1.2
  BASE_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.base_image || 'ghcr.io/an-1024/uos-server-20-1070u1e-arm64:latest' }}
  NGINX_VERSION: "1.26.2"
  REDIS_VERSION: "7.4.7"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and verify ARM64 image
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build, verify, and export artifacts
        env:
          ALLOW_NON_ARM64_BUILD: "1"
        run: |
          chmod +x entrypoint.sh scripts/*.sh
          ./scripts/build-arm64.sh

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uos1070u1-runtime-arm64
          path: |
            artifacts/*.tar.gz
            artifacts/dependency-audit/**
          if-no-files-found: error
          retention-days: 14

      - name: Upload raw tarball to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="runtime-1.2-$(date +%Y%m%d%H%M%S)-${{ github.run_id }}"
          TARBALL=$(ls artifacts/*-arm64-1.2.tar.gz 2>/dev/null | head -1)
          echo "Uploading $TARBALL to release $TAG..."
          gh release create "$TAG" "$TARBALL" \
            --title "Runtime 1.2 ($(date +%Y-%m-%d))" \
            --notes "UOS 1070U1 E ARM64: Java21 + Redis7 + nginx1.26 + LibreOffice25.8" \
            --target "${{ github.sha }}"
