name: Security Scan (Optional CI)

# =============================================================
# 可选安全扫描 CI (主构建环境是 Ubuntu 虚拟机 10.211.55.4)
# 此 workflow 用于 GitHub 上的备份安全扫描, 非主路径.
# 主路径: 在 Ubuntu 上构建后手动跑 trivy image
# =============================================================

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: UOS base image reachable from the GitHub runner
        required: true
        default: ghcr.io/an-1024/uos-server-20-1070u1e-arm64:latest
        type: string
      nginx_src_image:
        description: nginx source image (UnionTech)
        required: true
        default: registry.uniontech.com/uos-app/uos-server-25-nginx:1.26.2
        type: string
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - entrypoint.sh
      - nginx/**
      - redis/**
      - scripts/**
      - .github/workflows/security-scan.yml
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - entrypoint.sh
      - nginx/**
      - redis/**
      - scripts/**
      - .github/workflows/security-scan.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE: uos1070u1-java21-redis7-nginx1.26.2-arm64:v1.3
  BASE_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.base_image || 'ghcr.io/an-1024/uos-server-20-1070u1e-arm64:latest' }}
  NGINX_SRC_IMAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.nginx_src_image || 'registry.uniontech.com/uos-app/uos-server-25-nginx:1.26.2' }}
  REDIS_VERSION: "7.4.7"
  IMAGE_VERSION: "1.3"
  UNIONTECH_REGISTRY_USERNAME: ${{ secrets.UNIONTECH_REGISTRY_USERNAME }}
  UNIONTECH_REGISTRY_PASSWORD: ${{ secrets.UNIONTECH_REGISTRY_PASSWORD }}

jobs:
  scan:
    name: Build and scan ARM64 image
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to UnionTech registry
        if: env.UNIONTECH_REGISTRY_USERNAME != '' && env.UNIONTECH_REGISTRY_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          registry: registry.uniontech.com
          username: ${{ env.UNIONTECH_REGISTRY_USERNAME }}
          password: ${{ env.UNIONTECH_REGISTRY_PASSWORD }}

      - name: Pull base image
        run: |
          for attempt in 1 2 3; do
            echo "Pulling base image (${attempt}/3): ${BASE_IMAGE}"
            if docker pull --platform linux/arm64 "$BASE_IMAGE" 2>/dev/null || docker pull "$BASE_IMAGE"; then
              exit 0
            fi
            sleep 20
          done
          docker pull "$BASE_IMAGE"

      - name: Build image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --load \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            --build-arg NGINX_SRC_IMAGE="$NGINX_SRC_IMAGE" \
            --build-arg REDIS_VERSION="$REDIS_VERSION" \
            --build-arg IMAGE_VERSION="$IMAGE_VERSION" \
            -t "$IMAGE" \
            .

      - name: Verify image
        run: |
          chmod +x scripts/*.sh
          ./scripts/verify.sh

      - name: Prepare scan output
        run: mkdir -p artifacts/security-scan

      - name: Generate Trivy JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          format: json
          output: artifacts/security-scan/trivy-results.json
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "0"

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: artifacts/security-scan/trivy-results.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "0"

      - name: Enforce Trivy vulnerability policy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uos1070u1-security-scan-v1.3
          path: artifacts/security-scan/**
          if-no-files-found: warn
          retention-days: 14
