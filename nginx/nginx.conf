# nginx 1.26.2 配置
# 说明:
#   - user nginx; 对应 Dockerfile 中创建的 nginx 用户
#   - root /opt/web/dist; 通过 PVC 挂载前端资源
#   - /mobile/ 路由对应 /opt/web/mobile (PVC 挂载)
#   - /api/ 反向代理到后端 Java 服务 127.0.0.1:8080
#   - 不使用 rewrite 模块 (当前 nginx.conf 用 try_files, 不触发 CVE-2026-42530)

user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    access_log /logs/nginx.access.log;
    error_log /logs/nginx.error.log warn;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml font/ttf font/otf font/woff font/woff2;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream java_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # ===== 前端桌面端 =====
    server {
        listen 80;
        server_name _;
        root /opt/web/dist;
        index index.html;

        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
            try_files /index.html =404;
        }

        location ^~ /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ^~ /mobile/ {
            alias /opt/web/mobile/;
            index index.html;
            try_files $uri $uri/ /mobile/index.html;
        }

        location ~ ^/(api/)?actuator {
            return 403;
        }

        location /api/ {
            proxy_pass http://java_backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_redirect off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 60s;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
