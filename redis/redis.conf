# Redis 7.4.7 配置
# 说明:
#   - 密码默认 gaojing_5211 (兼容旧版)
#   - 生产环境建议通过 PVC 挂载自定义 redis.conf 覆盖此文件
#     或通过 entrypoint.sh 读取 REDIS_PASSWORD 环境变量动态替换
#   - 数据持久化到 /data/redis (PVC 挂载)
#   - 日志输出到 /logs/redis.log (PVC 挂载)

bind 0.0.0.0
port 6379
protected-mode yes
requirepass gaojing_5211
daemonize no
supervised no

# 数据目录 (PVC 挂载 /data)
dir /data/redis
dbfilename dump.rdb

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"

# 日志
logfile "/logs/redis.log"
loglevel notice

# RDB 快照策略
save 900 1
save 300 10
save 60 10000

# 内存管理 (按需调整, 博云平台根据节点内存配置)
# maxmemory 2gb
# maxmemory-policy allkeys-lru

# 客户端连接
maxclients 10000
timeout 0
tcp-keepalive 300

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128
